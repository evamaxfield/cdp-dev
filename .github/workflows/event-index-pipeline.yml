name: Event Index

on:
  workflow_dispatch:

  schedule:
    # <minute [0,59]> <hour [0,23]> <day of the month [1,31]> <month of the year [1,12]> <day of the week [0,6]>
    # https://pubs.opengroup.org/onlinepubs/9699919799/utilities/crontab.html#tag_20_25_07
    # Run every Thursday at 3:26:00 UTC
    # (Thursday at 19:26:00 PST)
    # We offset from the hour and half hour to go easy on the servers :)
    - cron: '26 3 * * 4'

# We doubly fan out
# We first generate indexs for uni, bi, and trigrams with a matrix
# Each index is split into chunks of 50,000 grams
# Then we fan out by every chunk and upload

jobs:
  generate-index-chunks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        n-gram: [1, 2, 3]
      fail-fast: false

    steps:
    # Setup Runner
    - uses: actions/checkout@v2
    - uses: actions/setup-python@v1
      with:
        python-version: 3.9

    # Setup GCloud / Creds
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v0
      with:
        project_id: cdp-jackson-dev-077
        service_account_key: ${{ secrets.GOOGLE_CREDENTIALS }}
        export_default_credentials: true
    - name: Dump Credentials to JSON
      run: |
        echo "$GOOGLE_CREDS" > python/google-creds.json
      env:
        GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS }}

    # Installs
    - name: Install Python Dependencies
      run: |
        cd python/
        pip install .

    - uses: actions/checkout@v2
      with:
        repository: 'councildataproject/cdp-backend'
        ref: 'feature/reduce-ngram-index'
        path: 'cdp-backend-branch'
    - run: |
        pip install ./cdp-backend-branch[pipeline]

    # Index
    - name: Index Events ${{ matrix.n-gram }}-grams
      run: |
        cd python/
        run_cdp_event_index_generation event-index-config.json \
          --n_grams ${{ matrix.n-gram }} \
          --parallel

    # Storage and Outputs
    - name: Store Index Chunks to Artifacts
      uses: actions/upload-artifact@v3
      with:
        path: python/index/*
        if-no-files-found: error
        retention-days: 6
    - name: Store Index Fileset to Outputs
      run: |
        cd python/index/
        output=$(python -c 'import os, json; print(json.dumps(os.listdir(".")))')
        echo "::set-output name=ngram-${{ matrix.n-gram }}-chunkset::$output"

  combine-matrix-ngram-chunksets:
    needs: generate-index-chunks
    runs-on: ubuntu-latest
    steps:
    # Setup Runner
    - uses: actions/checkout@v2
    - uses: actions/setup-python@v1
      with:
        python-version: 3.9

    # Process
    - name: Combine Chunksets
      id: 'combine-index-chunksets'
      run: |
        echo 'print('${{ needs.generate-index-chunks.outputs.ngram-1-chunkset }}' + '${{ needs.generate-index-chunks.outputs.ngram-2-chunkset }}' + '${{ needs.generate-index-chunks.outputs.ngram-3-chunkset }}')' >> print-combined-chunkset.py
        output=$(python print-combined-chunkset.py)
        echo "::set-output name=combined-chunkset::$output"

  upload-index-chunks:
    needs: combine-matrix-ngram-chunksets
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 6
      matrix: 
        filename: ${{ fromJson(needs.combine-matrix-ngram-chunksets.outputs.combined-chunkset) }}
      fail-fast: false
    
    steps:
    # Setup Runner
    - uses: actions/checkout@v2
    - uses: actions/setup-python@v1
      with:
        python-version: 3.9

    # Setup GCloud / Creds
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v0
      with:
        project_id: cdp-jackson-dev-077
        service_account_key: ${{ secrets.GOOGLE_CREDENTIALS }}
        export_default_credentials: true
    - name: Dump Credentials to JSON
      run: |
        echo "$GOOGLE_CREDS" > python/google-creds.json
      env:
        GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS }}

    # Installs
    - name: Install Python Dependencies
      run: |
        cd python/
        pip install .

    - uses: actions/checkout@v2
      with:
        repository: 'councildataproject/cdp-backend'
        ref: 'feature/reduce-ngram-index'
        path: 'cdp-backend-branch'
    - run: |
        pip install ./cdp-backend-branch[pipeline]

    # Download Chunk File
    - uses: actions/download-artifact@v3
      with:
        name: ${{ matrix.filename }}
        path: python/index/
    
    # Upload Index Chunk
    - name: Process Upload
      run: |
        cd python/
        upload_cdp_event_index_chunk event-index-config.json \
          index/${{ matrix.filename }} \
          --parallel